<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>N-Body PWA</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#1e1b75" />

  <style>
    :root {
      --bg-1: #0b0f3f;
      --bg-2: #1a1468;
      --bg-3: #2c0f66;
      --bg-4: #0d1f5e;

      --glass: rgba(33, 21, 95, 0.48);
      --glass-strong: rgba(36, 18, 104, 0.68);
      --glass-dark: rgba(15, 9, 50, 0.78);

      --line: rgba(255, 255, 255, 0.09);
      --line-soft: rgba(255, 255, 255, 0.05);

      --text: #f5f3ff;
      --muted: #cbd5ff;

      --accent: #6ee7ff;
      --accent-2: #a78bfa;
      --accent-3: #f0abfc;

      --success: #34d399;
      --danger: #fb7185;
      --warning: #fbbf24;

      --shadow-xl:
        0 18px 60px rgba(0, 0, 0, 0.28),
        0 8px 26px rgba(17, 24, 39, 0.22);

      --shadow-glow:
        0 0 0 1px rgba(255,255,255,0.02),
        0 0 40px rgba(103, 232, 249, 0.08),
        0 0 80px rgba(167, 139, 250, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    body {
      font-family: Inter, system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 18%, rgba(115, 210, 255, 0.22), transparent 18%),
        radial-gradient(circle at 78% 16%, rgba(164, 120, 255, 0.20), transparent 20%),
        radial-gradient(circle at 88% 82%, rgba(243, 114, 255, 0.18), transparent 16%),
        radial-gradient(circle at 20% 86%, rgba(97, 218, 251, 0.16), transparent 18%),
        linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 30%, var(--bg-3) 62%, var(--bg-4) 100%);
      position: relative;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background:
        radial-gradient(ellipse at 50% 50%, rgba(255,255,255,0.035), transparent 60%),
        repeating-radial-gradient(circle at 70% 30%, rgba(255,255,255,0.025) 0 1px, transparent 1px 26px);
      mix-blend-mode: screen;
      opacity: 0.45;
    }

    body::after {
      background:
        linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.04) 50%, transparent 100%);
      opacity: 0.06;
      transform: scale(1.25);
      filter: blur(30px);
    }

    .app {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100vh;
      padding: 24px;
      display: grid;
      grid-template-columns: 330px minmax(560px, 1fr) 260px;
      gap: 24px;
    }

    .glass-panel {
      position: relative;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02)),
        var(--glass);
      border: 1px solid var(--line);
      border-radius: 24px;
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      box-shadow: var(--shadow-xl), var(--shadow-glow);
      overflow: hidden;
    }

    .glass-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.10), transparent 26%, transparent 72%, rgba(255,255,255,0.04));
      pointer-events: none;
    }

    .settings-panel {
      padding: 24px 22px;
      overflow-y: auto;
      min-height: 0;
    }

    .settings-panel::-webkit-scrollbar {
      width: 8px;
    }

    .settings-panel::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.14);
      border-radius: 999px;
    }

    .settings-title {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 0.2px;
      margin-bottom: 20px;
      text-shadow: 0 0 18px rgba(255,255,255,0.12);
    }

    .group {
      margin-bottom: 24px;
      padding: 16px;
      background: rgba(7, 10, 35, 0.18);
      border: 1px solid var(--line-soft);
      border-radius: 18px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .group h3 {
      margin: 0 0 14px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.2px;
      color: #eef2ff;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
    }

    input[type="range"],
    input[type="number"],
    select {
      width: 100%;
    }

    input[type="number"],
    select {
      padding: 11px 12px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)),
        rgba(13, 10, 45, 0.72);
      color: var(--text);
      font-size: 14px;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }

    input[type="range"] {
      accent-color: #67e8f9;
    }

    .value {
      margin-top: 5px;
      font-size: 12px;
      color: #d8d4ff;
      opacity: 0.9;
    }

    .settings-actions {
      margin-top: 18px;
    }

    .btn {
      border: none;
      border-radius: 16px;
      padding: 12px 16px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      color: white;
      transition: transform 0.12s ease, box-shadow 0.18s ease, opacity 0.12s ease;
      box-shadow:
        0 8px 20px rgba(0,0,0,0.22),
        inset 0 1px 0 rgba(255,255,255,0.12);
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-success {
      background: linear-gradient(135deg, #10b981, #34d399);
    }

    .btn-danger {
      background: linear-gradient(135deg, #f43f5e, #fb7185);
    }

    .btn-warning {
      background: linear-gradient(135deg, #f59e0b, #fbbf24);
      color: #2a1300;
    }

    .btn-pause {
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
    }

    .center-column {
      display: grid;
      grid-template-rows: minmax(0, 1fr) 84px;
      gap: 18px;
      min-height: 0;
    }

    .sim-shell {
      position: relative;
      min-height: 0;
    }

    .sim-panel {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 28px;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.06), transparent 38%),
        linear-gradient(180deg, #02030d 0%, #02020a 100%);
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow:
        0 25px 80px rgba(0,0,0,0.35),
        0 0 0 1px rgba(255,255,255,0.03),
        0 0 70px rgba(103,232,249,0.08);
    }

    .sim-panel::before {
      content: "";
      position: absolute;
      inset: -20%;
      background:
        radial-gradient(circle at 58% 46%, rgba(103,232,249,0.09), transparent 16%),
        radial-gradient(circle at 42% 55%, rgba(167,139,250,0.08), transparent 18%),
        radial-gradient(circle at 70% 40%, rgba(255,255,255,0.03), transparent 14%);
      pointer-events: none;
      filter: blur(14px);
    }

    #canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: transparent;
    }

    .fullscreen-btn {
      position: absolute;
      right: 14px;
      bottom: 14px;
      width: 48px;
      height: 48px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03)),
        rgba(8, 8, 18, 0.58);
      color: white;
      display: grid;
      place-items: center;
      cursor: pointer;
      backdrop-filter: blur(8px);
      box-shadow:
        0 8px 26px rgba(0,0,0,0.24),
        inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .fullscreen-btn:hover {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.06)),
        rgba(14, 14, 28, 0.75);
    }

    .controls-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      width: 82%;
      justify-self: center;
      align-self: center;
    }

    .controls-row .btn {
      min-height: 58px;
      font-size: 16px;
      border-radius: 18px;
    }

    .right-column {
      display: grid;
      grid-template-rows: 0.95fr 1.25fr;
      gap: 20px;
      min-height: 0;
    }

    .fps-panel,
    .stats-panel {
      padding: 18px;
      min-height: 0;
    }

    .panel-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 14px;
      text-shadow: 0 0 16px rgba(255,255,255,0.08);
    }

    .fps-graph-wrap {
      width: 100%;
      height: calc(100% - 46px);
      min-height: 160px;
      padding: 10px;
      border-radius: 18px;
      border: 1px solid var(--line-soft);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02)),
        rgba(12, 8, 42, 0.52);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }

    #fpsCanvas {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 12px;
      background: rgba(15, 7, 40, 0.72);
    }

    .stats-list {
      display: grid;
      gap: 12px;
      max-height: calc(100% - 46px);
      overflow: auto;
      padding-right: 2px;
    }

    .stats-list::-webkit-scrollbar {
      width: 8px;
    }

    .stats-list::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.10);
      border-radius: 999px;
    }

    .stat-item {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.015)),
        rgba(10, 7, 37, 0.52);
      border: 1px solid var(--line-soft);
      border-radius: 18px;
      padding: 14px 16px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.03),
        0 8px 24px rgba(0,0,0,0.16);
    }

    .stat-item .k {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .stat-item .v {
      font-size: 22px;
      font-weight: 800;
      line-height: 1.15;
    }

    @media (max-width: 1260px) {
      .app {
        grid-template-columns: 300px 1fr 230px;
        gap: 18px;
        padding: 18px;
      }
    }

    @media (max-width: 1080px) {
      html, body {
        overflow: auto;
      }

      .app {
        min-height: 100vh;
        height: auto;
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
      }

      .settings-panel,
      .right-column,
      .center-column {
        min-height: auto;
      }

      .center-column {
        grid-template-rows: 520px 84px;
      }

      .right-column {
        grid-template-rows: auto auto;
      }
    }

    @media (max-width: 720px) {
      .controls-row {
        width: 100%;
      }

      .center-column {
        grid-template-rows: 420px 84px;
      }

      .panel-title {
        font-size: 20px;
      }

      .settings-title {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Слева -->
    <aside class="glass-panel settings-panel">
      <div class="settings-title">Настройки</div>

      <div class="group">
        <h3>Сценарий</h3>

        <div class="field">
          <label for="presetSelect">Пресет симуляции</label>
          <select id="presetSelect">
            <option value="galaxy" selected>Галактика</option>
            <option value="collapse">Коллапс</option>
            <option value="explosion">Взрыв</option>
            <option value="two-galaxies">Две галактики</option>
          </select>
        </div>

        <div class="field">
          <label for="bodiesInput">Количество тел</label>
          <input id="bodiesInput" type="number" min="10" max="3000" step="10" value="400" />
        </div>

        <div class="field">
          <label for="iterationsRange">Итераций за кадр</label>
          <input id="iterationsRange" type="range" min="1" max="12" step="1" value="2" />
          <div class="value" id="iterationsValue">2</div>
        </div>
      </div>

      <div class="group">
        <h3>Физика</h3>

        <div class="field">
          <label for="gravityRange">Сила притяжения</label>
          <input id="gravityRange" type="range" min="1" max="100" step="1" value="30" />
          <div class="value" id="gravityValue">30</div>
        </div>

        <div class="field">
          <label for="dtRange">Шаг времени</label>
          <input id="dtRange" type="range" min="0.001" max="0.05" step="0.001" value="0.016" />
          <div class="value" id="dtValue">0.016</div>
        </div>

        <div class="field">
          <label for="softRange">Смягчение гравитации</label>
          <input id="softRange" type="range" min="1" max="40" step="1" value="8" />
          <div class="value" id="softValue">8</div>
        </div>

        <div class="field">
          <label for="bounceRange">Упругость границ</label>
          <input id="bounceRange" type="range" min="0" max="1" step="0.01" value="0.85" />
          <div class="value" id="bounceValue">0.85</div>
        </div>
      </div>

      <div class="group">
        <h3>Визуализация</h3>

        <div class="field">
          <label for="trailRange">Длина следа</label>
          <input id="trailRange" type="range" min="0" max="1" step="0.01" value="0.12" />
          <div class="value" id="trailValue">0.12</div>
        </div>

        <div class="field">
          <label for="radiusRange">Размер частиц</label>
          <input id="radiusRange" type="range" min="1" max="6" step="0.1" value="1.6" />
          <div class="value" id="radiusValue">1.6</div>
        </div>

        <div class="field">
          <label for="glowRange">Свечение</label>
          <input id="glowRange" type="range" min="0" max="1.5" step="0.01" value="0.65" />
          <div class="value" id="glowValue">0.65</div>
        </div>
      </div>

      <div class="settings-actions">
        <button id="defaultsBtn" class="btn btn-warning">Сброс настроек</button>
      </div>
    </aside>

    <!-- Центр -->
    <main class="center-column">
      <section class="sim-shell">
        <div class="sim-panel">
          <canvas id="canvas" width="1000" height="740"></canvas>

          <button id="fullscreenBtn" class="fullscreen-btn" aria-label="Fullscreen">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
              <path d="M8 3H3V8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M16 3H21V8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M8 21H3V16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M16 21H21V16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </section>

      <div class="controls-row">
        <button id="startBtn" class="btn btn-success">Старт</button>
        <button id="pauseBtn" class="btn btn-pause">Пауза</button>
        <button id="resetBtn" class="btn btn-danger">Сброс системы</button>
      </div>
    </main>

    <!-- Справа -->
    <aside class="right-column">
      <section class="glass-panel fps-panel">
        <div class="panel-title">ФПС график</div>
        <div class="fps-graph-wrap">
          <canvas id="fpsCanvas" width="220" height="140"></canvas>
        </div>
      </section>

      <section class="glass-panel stats-panel">
        <div class="panel-title">Другие показатели</div>

        <div class="stats-list">
          <div class="stat-item">
            <div class="k">Статус</div>
            <div class="v" id="statusStat">loading</div>
          </div>

          <div class="stat-item">
            <div class="k">FPS</div>
            <div class="v" id="fpsStat">0</div>
          </div>

          <div class="stat-item">
            <div class="k">Тел</div>
            <div class="v" id="bodiesStat">0</div>
          </div>

          <div class="stat-item">
            <div class="k">Время физики / кадр</div>
            <div class="v" id="physicsStat">0 ms</div>
          </div>

          <div class="stat-item">
            <div class="k">Кинетическая энергия</div>
            <div class="v" id="kineticStat">0</div>
          </div>

          <div class="stat-item">
            <div class="k">Полная энергия</div>
            <div class="v" id="totalEnergyStat">0</div>
          </div>

          <div class="stat-item">
            <div class="k">Service Worker</div>
            <div class="v" id="swStat">not registered</div>
          </div>

          <div class="stat-item">
            <div class="k">Сценарий</div>
            <div class="v" id="presetStat">galaxy</div>
          </div>
        </div>
      </section>
    </aside>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
